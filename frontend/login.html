<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boleia.pt — Entrar</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body>

<div class="navbar-wrapper">
  <header class="navbar">
    <a class="brand" href="index.html">
      <div class="brand-icon"><i class="bi bi-car-front-fill"></i></div>
      Boleia.pt
    </a>
    <div class="nav-links">
      <a href="index.html#como-funciona" class="nav-item"><i class="bi bi-question-circle"></i> Como Funciona</a>
    </div>
    <div class="user-actions">
      <a href="registo.html" class="nav-btn">Registar</a>
    </div>
  </header>
</div>

<div class="auth-card">
  <div class="auth-icon"><i class="bi bi-car-front-fill"></i></div>
  <h2>Bem-vindo de volta</h2>
  <p class="auth-subtitle">Acede à tua conta para continuar.</p>

  <form onsubmit="entrar(event)">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="exemplo@email.com" autocomplete="email" required />
    </div>
    <div class="form-group">
      <label for="password">Palavra-passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
    </div>

    <div id="erro" class="alert alert-danger" style="display:none" role="alert">
      <i class="bi bi-x-circle-fill"></i>
      <span id="erro-msg"></span>
    </div>

    <button type="submit" id="btn-entrar" class="btn-submit"><i class="bi bi-box-arrow-in-right"></i> Entrar na Conta</button>
  </form>

  <p class="auth-footer">Ainda não tens conta? <a href="registo.html">Regista-te aqui</a></p>
  <p class="auth-footer" style="margin-top:8px"><a href="index.html"><i class="bi bi-arrow-left"></i> Voltar ao início</a></p>
</div>

<script src="utils.js"></script>
<script>
  async function entrar(e) {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const erroDiv  = document.getElementById('erro');
    const erroMsg  = document.getElementById('erro-msg');
    const btn      = document.getElementById('btn-entrar');

    erroDiv.style.display = 'none';
    btnLoad(btn, true, 'A entrar...');

    try {
      const res  = await fetch('../backend/auth/login.php', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (data.success) {
        const r = data.user.role;
        window.location.href = r === 'ADMIN' ? 'admin.html'
          : (r === 'DRIVER' || r === 'BOTH') ? 'dashboard_condutor.html'
          : 'dashboard.html';
      } else {
        erroMsg.textContent = data.message;
        erroDiv.style.display = 'flex';
        btnLoad(btn, false);
      }
    } catch {
      erroMsg.textContent = 'Erro de ligação. Tenta novamente.';
      erroDiv.style.display = 'flex';
      btnLoad(btn, false);
    }
  }
</script>

</body>
</html>
