<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boleia.pt — Entrar</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body>

<h1><i class="bi bi-car-front-fill" aria-hidden="true"></i> Boleia.pt</h1>
<h2>Entrar na conta</h2>

<div class="caixa" style="max-width:380px;margin-top:20px">
  <form onsubmit="entrar(event)" style="display:flex;flex-direction:column;gap:14px">
    <div>
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="exemplo@email.com" autocomplete="email" required />
    </div>
    <div>
      <label for="password">Palavra-passe</label>
      <input type="password" id="password" placeholder="A tua palavra-passe" autocomplete="current-password" required />
    </div>

    <div id="erro" class="alert alert-danger" style="display:none" role="alert">
      <i class="bi bi-x-circle-fill"></i>
      <span id="erro-msg"></span>
    </div>

    <button type="submit" id="btn-entrar"><i class="bi bi-box-arrow-in-right"></i> Entrar</button>
  </form>

  <p style="margin-top:16px;font-size:0.875rem;color:var(--muted)">
    Ainda não tens conta? <a href="registo.html">Regista-te aqui</a>
  </p>
</div>

<br>
<a href="index.html" class="back-link"><i class="bi bi-arrow-left"></i> Voltar ao início</a>

<script src="utils.js"></script>
<script>
  async function entrar(e) {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const erroDiv  = document.getElementById('erro');
    const erroMsg  = document.getElementById('erro-msg');
    const btn      = document.getElementById('btn-entrar');

    erroDiv.style.display = 'none';
    btnLoad(btn, true, 'A entrar...');

    try {
      const res  = await fetch('../backend/auth/login.php', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (data.success) {
        window.location.href = data.user.role === 'ADMIN' ? 'admin.html' : 'dashboard.html';
      } else {
        erroMsg.textContent = data.message;
        erroDiv.style.display = 'flex';
        btnLoad(btn, false);
      }
    } catch {
      erroMsg.textContent = 'Erro de ligação. Tenta novamente.';
      erroDiv.style.display = 'flex';
      btnLoad(btn, false);
    }
  }
</script>

</body>
</html>
