<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boleia.pt — Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

<div class="navbar-wrapper">
  <header class="navbar">
    <a class="brand" href="dashboard.html">
      <div class="brand-icon"><i class="bi bi-car-front-fill"></i></div>
      Boleia.pt
    </a>
    <div class="nav-links" id="nav-main">
      <a href="pesquisa.html" class="nav-item"><i class="bi bi-search"></i> Pesquisar</a>
      <a href="publicar.html" class="nav-item" id="nav-publicar"><i class="bi bi-car-front-fill"></i> Oferecer Boleia</a>
      <a href="reservas.html" class="nav-item"><i class="bi bi-ticket-perforated"></i> Reservas</a>
    </div>
    <div class="user-actions">
      <span class="user-greeting">Olá, <b id="nome-user">...</b></span>
      <a href="perfil.html" class="nav-item"><i class="bi bi-person-circle"></i> Perfil</a>
      <a href="#" onclick="sair(event)" class="nav-item"><i class="bi bi-box-arrow-right"></i> Sair</a>
    </div>
  </header>
</div>

<div class="dash-profile-card">
  <div class="dash-profile-left">
    <div class="dash-avatar" id="dash-avatar">
      <span class="skeleton" style="width:100%;height:100%;border-radius:50%"></span>
    </div>
    <div>
      <p class="dash-profile-name" id="dash-nome">
        <span class="skeleton" style="width:140px;height:18px;display:inline-block;border-radius:6px"></span>
      </p>
      <p class="dash-profile-role" id="dash-role-text">
        <span class="skeleton" style="width:90px;height:12px;display:inline-block"></span>
      </p>
    </div>
  </div>
  <div class="dash-profile-actions">
    <a href="pesquisa.html" class="nav-btn"><i class="bi bi-search"></i> Pesquisar boleia</a>
    <a href="perfil.html" class="btn-sm btn-muted"><i class="bi bi-pencil-square"></i> Editar Perfil</a>
  </div>
</div>

<div id="secao-passageiro" class="dash-section">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
    <h2 style="margin-bottom:0"><i class="bi bi-ticket-perforated"></i> As minhas reservas</h2>
    <a href="reservas.html" style="font-size:0.875rem;color:var(--primary);font-weight:500;text-decoration:none">Ver todas <i class="bi bi-arrow-right"></i></a>
  </div>
  <div id="reservas-tabela"></div>
</div>

<div id="secao-historico" class="dash-section" style="display:none">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
    <h2 style="margin-bottom:0"><i class="bi bi-clock-history"></i> Viagens passadas</h2>
    <a href="reservas.html" style="font-size:0.875rem;color:var(--primary);font-weight:500;text-decoration:none">Ver todas <i class="bi bi-arrow-right"></i></a>
  </div>
  <div id="historico-tabela"></div>
</div>

<div id="secao-sugestoes" class="dash-section" style="display:none">
  <h2><i class="bi bi-lightning-charge-fill"></i> Próximas viagens disponíveis</h2>
  <div id="sugestoes-grid"></div>
</div>

<footer>
  <small>&copy; 2026 Boleia.pt — <a href="sobre.html">Sobre nós</a> | <a href="#">Termos de Uso</a> | <a href="#">Privacidade</a> | <a href="contacto.html">Contacto</a></small>
</footer>

<script src="utils.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
