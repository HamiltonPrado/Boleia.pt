<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boleia.pt — Pesquisar Boleia</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body>

<h1><i class="bi bi-car-front-fill" aria-hidden="true"></i> Boleia.pt</h1>
<p class="user-bar">Olá, <b id="nome-user">...</b> &nbsp;|&nbsp; <a href="perfil.html"><i class="bi bi-person"></i> Perfil</a> &nbsp;<a href="#" onclick="sair(event)"><i class="bi bi-box-arrow-right"></i> Sair</a></p>
<nav>
  <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
  <a href="publicar.html" id="nav-publicar"><i class="bi bi-car-front-fill"></i> Oferecer Boleia</a>
  <a href="reservas.html"><i class="bi bi-ticket-perforated"></i> Reservas</a>
  <a href="perfil.html"><i class="bi bi-person-circle"></i> Perfil</a>
</nav>

<hr>

<h2><i class="bi bi-search"></i> Pesquisar Boleia</h2>

<div class="filter-bar">
  <form onsubmit="pesquisar(event)">
    <div class="form-row">
      <div class="form-group">
        <label for="data">Data</label>
        <input type="date" id="data" required />
      </div>
      <div class="form-group">
        <label for="preco-max">Preço máximo (€)</label>
        <input type="number" id="preco-max" min="0" step="0.5" placeholder="Qualquer" />
      </div>
      <div class="form-group">
        <label for="lugares-min">Lugares mínimos</label>
        <select id="lugares-min">
          <option value="">Qualquer</option>
          <option value="1">1+</option>
          <option value="2">2+</option>
          <option value="3">3+</option>
          <option value="4">4+</option>
        </select>
      </div>
      <div style="display:flex;align-items:flex-end;gap:8px">
        <button type="submit" id="btn-pesquisar"><i class="bi bi-search"></i> Pesquisar</button>
        <button type="button" onclick="limparFiltros()"><i class="bi bi-x-circle"></i> Limpar</button>
      </div>
    </div>
  </form>
</div>

<div id="resultados"></div>

<hr>
<a href="dashboard.html" class="back-link"><i class="bi bi-arrow-left"></i> Voltar ao dashboard</a>
<div id="modal-overlay" style="display:none" class="modal-overlay" onclick="fecharModalOverlay(event)">
  <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <h3 id="modal-title">Perfil do Condutor</h3>
      <button class="modal-close" onclick="fecharModal()" aria-label="Fechar"><i class="bi bi-x-lg"></i></button>
    </div>
    <div id="modal-conteudo">A carregar...</div>
  </div>
</div>

<script src="utils.js"></script>
<script>
  let todosResultados = [];

  async function sair(e) {
    e.preventDefault();
    await fetch('../backend/auth/logout.php', { method: 'POST' });
    window.location.href = 'login.html';
  }

  async function init() {
    const me = await fetch('../backend/auth/me.php');
    if (!me.ok) { window.location.href = 'login.html'; return; }
    const { user } = await me.json();
    document.getElementById('nome-user').textContent = user.full_name;
    document.getElementById('data').value = new Date().toISOString().slice(0,10);

    if (user.role === 'ADMIN') {
      const nav = document.querySelector('nav');
      const a = document.createElement('a');
      a.href = 'admin.html';
      a.innerHTML = '<i class="bi bi-shield-lock"></i> Administração';
      nav.appendChild(a);
    }
    if (user.role === 'PASSENGER') {
      document.getElementById('nav-publicar').style.display = 'none';
    }
  }

  async function pesquisar(e) {
    e.preventDefault();
    const date = document.getElementById('data').value;
    const div  = document.getElementById('resultados');
    const btn  = document.getElementById('btn-pesquisar');

    div.innerHTML = skeletonRows(4, [120,120,60,50,100,40,40,60,60]);
    btnLoad(btn, true, 'A pesquisar...');

    try {
      const res  = await fetch(`../backend/bookings/search.php?date=${date}`);
      const data = await res.json();

      if (!data.success) {
        div.innerHTML = `<div class="alert alert-danger"><i class="bi bi-x-circle-fill"></i> ${esc(data.message)}</div>`;
        return;
      }
      todosResultados = data.results || [];
      aplicarFiltros();
    } finally {
      btnLoad(btn, false);
    }
  }

  function aplicarFiltros() {
    const precoMax   = parseFloat(document.getElementById('preco-max').value) || Infinity;
    const lugaresMin = parseInt(document.getElementById('lugares-min').value) || 0;
    const filtrados  = todosResultados.filter(v => {
      const preco  = Number(v.price_per_seat);
      const livres = v.total_seats - v.seats_taken;
      return preco <= precoMax && livres >= lugaresMin;
    });
    renderResultados(filtrados);
  }

  function limparFiltros() {
    document.getElementById('preco-max').value   = '';
    document.getElementById('lugares-min').value = '';
    if (todosResultados.length > 0) renderResultados(todosResultados);
  }

  function renderResultados(r) {
    const div = document.getElementById('resultados');
    if (r.length === 0) {
      div.innerHTML = `<div class="empty-state">
        <i class="bi bi-calendar-x"></i>
        <p>${todosResultados.length === 0 ? 'Sem viagens disponíveis para esta data.' : 'Nenhum resultado corresponde aos filtros selecionados.'}</p>
      </div>`;
      return;
    }

    div.innerHTML = `
      <p class="result-count"><i class="bi bi-check-circle-fill"></i> ${r.length} de ${todosResultados.length} viagem(ns)</p>
      <div class="table-wrap"><table border="1" cellpadding="8"><thead><tr>
        <th>Origem</th><th>Destino</th><th>Data</th><th>Hora</th>
        <th>Condutor</th><th>Avaliação</th><th>Viagens</th><th>Lugares</th><th>Preço/pessoa</th><th>Ação</th>
      </tr></thead><tbody>
      ${r.map(v => {
        const stops   = typeof v.stops === 'string' ? JSON.parse(v.stops) : (v.stops || []);
        const origem  = stops[0]?.address || '—';
        const destino = stops[stops.length-1]?.address || '—';
        const livres  = v.total_seats - v.seats_taken;
        const rating  = v.avg_rating ? `<span style="color:var(--warning)">★</span> ${Number(v.avg_rating).toFixed(1)}` : '—';
        return `<tr>
          <td>${esc(origem)}</td>
          <td>${esc(destino)}</td>
          <td>${fmt(v.date)}</td>
          <td>${v.depart_time?.slice(0,5)}</td>
          <td>
            <a href="#" onclick="verCondutor(event,'${v.driver_id}')" style="font-weight:500">
              <i class="bi bi-person-circle"></i> ${esc(v.driver_name)}
            </a>
          </td>
          <td>${rating}</td>
          <td>${v.total_trips || 0}</td>
          <td><b>${livres}</b></td>
          <td class="price-tag">${Number(v.price_per_seat).toFixed(2)} <small>€</small></td>
          <td><a href="#" onclick="verViagem(event,${todosResultados.indexOf(v)})" class="btn-sm btn-info"><i class="bi bi-arrow-right-circle-fill"></i> Reservar</a></td>
        </tr>`;
      }).join('')}
      </tbody></table></div>`;
  }

  function verViagem(e, idx) {
    e.preventDefault();
    sessionStorage.setItem('viagem_atual', JSON.stringify(todosResultados[idx]));
    window.location.href = 'viagem.html';
  }

  async function verCondutor(e, driverId) {
    e.preventDefault();
    const overlay = document.getElementById('modal-overlay');
    const cont    = document.getElementById('modal-conteudo');
    overlay.style.display = 'flex';
    cont.innerHTML = skeletonRows(3, [80, 160]);

    try {
      const profRes  = await fetch(`../backend/users/profile.php?id=${driverId}`);
      const profData = await profRes.json();
      const p       = profData.profile || {};
      const reviews = profData.reviews || [];
      const rating  = p.avg_rating ? Number(p.avg_rating).toFixed(1) : '—';

      cont.innerHTML = `
        <div style="margin-bottom:16px">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
            <div style="width:48px;height:48px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:var(--primary)">
              <i class="bi bi-person-fill"></i>
            </div>
            <div>
              <div style="font-size:1.05rem;font-weight:700;color:var(--dark)">${esc(p.full_name || '—')}</div>
              <div style="font-size:0.85rem;color:var(--muted)">${p.total_trips || 0} viagem(ns) concluída(s)</div>
            </div>
          </div>
          <div style="display:flex;gap:16px;flex-wrap:wrap">
            <div class="stat-card c-warning" style="flex:1;min-width:120px;padding:12px 14px">
              <div class="stat-label">Avaliação</div>
              <div class="stat-value" style="font-size:1.3rem">${rating} <span style="font-size:0.9rem;color:var(--warning)">★</span></div>
            </div>
            ${p.car_make ? `<div class="stat-card c-primary" style="flex:1;min-width:120px;padding:12px 14px">
              <div class="stat-label">Veículo</div>
              <div class="stat-value" style="font-size:0.95rem;font-weight:600">${esc(p.car_make)} ${esc(p.car_model||'')} <span style="color:var(--muted);font-size:0.8rem">(${p.car_year||''})</span></div>
            </div>` : ''}
          </div>
        </div>
        <h4 style="margin:0 0 8px">Avaliações recentes</h4>
        ${reviews.length === 0
          ? '<p style="color:var(--muted);font-size:0.875rem">Sem avaliações ainda.</p>'
          : reviews.slice(0, 5).map(r => `
            <div style="padding:10px 0;border-bottom:1px solid var(--border)">
              <div style="color:var(--warning);font-size:0.85rem;margin-bottom:3px">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
              ${r.comment ? `<div style="font-size:0.875rem;color:var(--text);font-style:italic">"${esc(r.comment)}"</div>` : ''}
              <div style="font-size:0.78rem;color:var(--muted);margin-top:3px">${esc(r.reviewer_name || 'Anónimo')}</div>
            </div>`).join('')
        }`;
    } catch {
      cont.innerHTML = '<div class="alert alert-danger"><i class="bi bi-x-circle-fill"></i> Erro ao carregar perfil.</div>';
    }
  }

  function fecharModal() {
    document.getElementById('modal-overlay').style.display = 'none';
  }

  function fecharModalOverlay(e) {
    if (e.target === document.getElementById('modal-overlay')) fecharModal();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') fecharModal();
  });

  function fmt(d) { if (!d) return '—'; const [y,m,dd] = d.split('-'); return `${dd}/${m}/${y}`; }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  init();
</script>

</body>
</html>
