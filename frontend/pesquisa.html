<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boleia.pt — Pesquisar Boleia</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/pesquisa.css" />
</head>
<body>

<div class="navbar-wrapper">
  <header class="navbar">
    <a class="brand" href="dashboard.html" id="nav-brand">
      <div class="brand-icon"><i class="bi bi-car-front-fill"></i></div>
      Boleia.pt
    </a>
    <div class="nav-links" id="nav-main">
      <a href="dashboard.html" class="nav-item" id="nav-dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="pesquisa.html" class="nav-item nav-active"><i class="bi bi-search"></i> Pesquisar</a>
      <a href="publicar.html" class="nav-item" id="nav-publicar"><i class="bi bi-car-front-fill"></i> Oferecer Boleia</a>
      <a href="reservas.html" class="nav-item" id="nav-reservas"><i class="bi bi-ticket-perforated"></i> Reservas</a>
    </div>
    <div class="user-actions">
      <span class="user-greeting">Olá, <b id="nome-user">...</b></span>
      <a href="perfil.html" class="nav-item"><i class="bi bi-person-circle"></i> Perfil</a>
      <a href="#" onclick="sair(event)" class="nav-item"><i class="bi bi-box-arrow-right"></i> Sair</a>
    </div>
  </header>
</div>

<div id="search-bar-wrap">
  <div class="search-bar">
    <div class="sb-wrap" id="wrap-origem">
      <i class="bi bi-geo-alt-fill" style="color:var(--success)"></i>
      <input type="text" id="origem" placeholder="Origem" autocomplete="off"
        oninput="sugerirLocal('origem')"
        onkeydown="navSugestoes(event,'origem')"
        onblur="fecharSugestoes('origem',300)" />
      <div class="sb-suggestions" id="sug-origem" style="display:none"></div>
    </div>
    <i class="bi bi-arrow-right sb-arrow"></i>
    <div class="sb-wrap" id="wrap-destino">
      <i class="bi bi-geo-alt-fill" style="color:var(--danger)"></i>
      <input type="text" id="destino" placeholder="Destino" autocomplete="off"
        oninput="sugerirLocal('destino')"
        onkeydown="navSugestoes(event,'destino')"
        onblur="fecharSugestoes('destino',300)" />
      <div class="sb-suggestions" id="sug-destino" style="display:none"></div>
    </div>
    <div class="sb-divider"></div>
    <div class="sb-wrap" style="flex:0 0 auto;min-width:130px">
      <i class="bi bi-calendar-event"></i>
      <input type="date" id="data" />
    </div>
    <button id="btn-pesquisar" onclick="pesquisar(event)"><i class="bi bi-search"></i> Pesquisar</button>
  </div>
</div>

<div id="pre-search">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <h2 style="margin:0"><i class="bi bi-lightning-charge-fill"></i> Próximas viagens disponíveis</h2>
    <span style="font-size:0.82rem;color:var(--muted)">Seleciona uma data para filtrar</span>
  </div>
  <div id="pre-search-grid"><div class="rc-grid" id="pre-rc-grid"></div></div>
</div>

<div id="search-summary" style="display:none;margin-bottom:24px">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:16px">
    <div>
      <div style="font-size:1.15rem;font-weight:700;color:var(--dark);margin-bottom:3px" id="summary-date-title"></div>
      <div style="font-size:0.875rem;color:var(--muted)" id="summary-date-sub"></div>
    </div>
    <button type="button" onclick="alterarPesquisa()" style="background:var(--surface);color:var(--dark);border:1.5px solid var(--border);border-radius:99px;padding:8px 18px;font-size:0.875rem;white-space:nowrap">Alterar pesquisa</button>
  </div>
</div>

<div id="results-layout" class="results-layout" style="display:none">
  <aside class="filter-sidebar">
    <button class="btn-filtros-mobile" type="button" onclick="toggleFiltrosMobile(this)" aria-expanded="false">
      <span><i class="bi bi-sliders"></i> Filtros</span>
      <i class="bi bi-chevron-down" id="filtros-chevron"></i>
    </button>
    <p class="filter-title" style="display:none" id="filter-title-desk">Filtros</p>

    <div class="filter-sidebar-inner">
    <div class="filter-section">
      <span class="filter-section-label">Ordenar por</span>
      <select id="ordenar" onchange="aplicarFiltros()">
        <option value="price-asc">Preço (mais barato)</option>
        <option value="price-desc">Preço (mais caro)</option>
        <option value="time-asc">Hora de partida</option>
      </select>
    </div>

    <div class="filter-section">
      <span class="filter-section-label">Hora de Partida</span>
      <label class="filter-option"><input type="checkbox" class="hora-filter" value="6-12" onchange="aplicarFiltros()"> 06:00 - 12:00</label>
      <label class="filter-option"><input type="checkbox" class="hora-filter" value="12-18" onchange="aplicarFiltros()"> 12:00 - 18:00</label>
      <label class="filter-option"><input type="checkbox" class="hora-filter" value="18-24" onchange="aplicarFiltros()"> 18:00 - 24:00</label>
    </div>

    <div class="filter-section">
      <span class="filter-section-label">Avaliação do Condutor</span>
      <label class="filter-option"><input type="radio" name="rating-filter" class="rating-filter" value="4.5" onchange="aplicarFiltros()"> 4.5+ <span style="color:var(--warning)">★</span></label>
      <label class="filter-option"><input type="radio" name="rating-filter" class="rating-filter" value="4.0" onchange="aplicarFiltros()"> 4.0+ <span style="color:var(--warning)">★</span></label>
      <button class="filter-clear" onclick="limparFiltros()">Limpar filtros</button>
    </div>
    </div>
  </aside>

  <div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <p class="results-header" id="results-title" style="margin:0"></p>
      <button class="btn-toggle-mapa" id="btn-mapa" onclick="toggleMapa()"><i class="bi bi-map-fill"></i> Ver no mapa</button>
    </div>
    <div id="resultados"></div>
  </div>

  <div class="mapa-col" id="mapa-col">
    <div id="mapa-pesquisa"></div>
  </div>
</div>

<div id="modal-overlay" style="display:none" class="modal-overlay" onclick="fecharModalOverlay(event)">
  <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <h3 id="modal-title">Perfil do Condutor</h3>
      <button class="modal-close" onclick="fecharModal()" aria-label="Fechar"><i class="bi bi-x-lg"></i></button>
    </div>
    <div id="modal-conteudo">A carregar...</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="utils.js"></script>
<script src="js/pesquisa.js"></script>

</body>
</html>
