<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boleia.pt — Registo</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body>

<h1><i class="bi bi-car-front-fill" aria-hidden="true"></i> Boleia.pt</h1>
<h2>Criar conta</h2>

<form onsubmit="registar(event)">
  <label>Nome completo:<br>
    <input type="text" id="nome" placeholder="Ex: João Silva" size="30" />
  </label><br><br>

  <label>Email:<br>
    <input type="email" id="email" placeholder="exemplo@email.com" size="30" />
  </label><br><br>

  <label>Telemóvel:<br>
    <input type="tel" id="telemovel" placeholder="9XX XXX XXX" size="30" />
  </label><br><br>

  <label>Palavra-passe:<br>
    <input type="password" id="password" placeholder="Mínimo 8 caracteres" size="30" />
  </label><br><br>

  <label>Confirmar palavra-passe:<br>
    <input type="password" id="confirmar" placeholder="Repete a palavra-passe" size="30" />
  </label><br><br>

  <fieldset>
    <legend>Tipo de conta</legend>
    <label><input type="radio" name="tipo" value="PASSENGER" checked /> Passageiro</label>
    &nbsp;
    <label><input type="radio" name="tipo" value="DRIVER" /> Condutor</label>
    &nbsp;
    <label><input type="radio" name="tipo" value="BOTH" /> Ambos</label>
  </fieldset><br>

  <button type="submit"><i class="bi bi-person-plus-fill"></i> Criar conta</button>
</form>

<p id="erro" style="color:red;display:none"></p>

<br>
<p>Já tens conta? <a href="login.html">Entra aqui</a></p>

<hr>
<a href="index.html" class="back-link"><i class="bi bi-arrow-left"></i> Voltar ao início</a>

<script src="utils.js"></script>
<script>
  async function registar(e) {
    e.preventDefault();
    const full_name = document.getElementById('nome').value.trim();
    const email     = document.getElementById('email').value.trim();
    const phone     = document.getElementById('telemovel').value.trim();
    const password  = document.getElementById('password').value;
    const confirmar = document.getElementById('confirmar').value;
    const role      = document.querySelector('input[name="tipo"]:checked').value;
    const erro      = document.getElementById('erro');
    erro.style.display = 'none';

    if (password !== confirmar) { erro.textContent = 'As palavras-passe não coincidem.'; erro.style.display = 'block'; return; }

    const res  = await fetch('../backend/auth/register.php', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({full_name, email, phone, password, role}) });
    const data = await res.json();

    if (data.success) {
      window.location.href = data.user.role === 'ADMIN' ? 'admin.html' : 'dashboard.html';
    } else {
      erro.textContent = data.message;
      erro.style.display = 'block';
    }
  }
</script>

</body>
</html>
