<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boleia.pt — Registo</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body>

<div class="navbar-wrapper">
  <header class="navbar">
    <a class="brand" href="index.html">
      <div class="brand-icon"><i class="bi bi-car-front-fill"></i></div>
      Boleia.pt
    </a>
    <div class="nav-links">
      <a href="index.html#como-funciona" class="nav-item"><i class="bi bi-question-circle"></i> Como Funciona</a>
    </div>
    <div class="user-actions">
      <a href="login.html" class="nav-item"><i class="bi bi-box-arrow-in-right"></i> Entrar</a>
    </div>
  </header>
</div>

<div class="auth-card" style="max-width:480px">
  <h2>Criar Conta</h2>
  <p class="auth-subtitle">Junta-te à maior comunidade de boleias.</p>

  <form onsubmit="registar(event)">
    <div class="auth-name-row">
      <div class="form-group" style="margin-bottom:0">
        <label>Nome</label>
        <input type="text" id="nome" placeholder="João" required />
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>Apelido</label>
        <input type="text" id="apelido" placeholder="Silva" required />
      </div>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="exemplo@email.com" autocomplete="email" required />
    </div>
    <div class="form-group">
      <label>Telemóvel</label>
      <input type="tel" id="telemovel" placeholder="9XX XXX XXX" autocomplete="tel" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required />
    </div>

    <div id="erro" class="alert alert-danger" style="display:none;text-align:left"></div>

    <button type="submit" class="btn-submit"><i class="bi bi-person-plus-fill"></i> Criar Conta</button>
  </form>

  <p class="auth-footer">Já tens conta? <a href="login.html">Entra aqui</a></p>
</div>

<script src="utils.js"></script>
<script>
  async function registar(e) {
    e.preventDefault();
    const nome     = document.getElementById('nome').value.trim();
    const apelido  = document.getElementById('apelido').value.trim();
    const email    = document.getElementById('email').value.trim();
    const phone    = document.getElementById('telemovel').value.trim();
    const password = document.getElementById('password').value;
    const erro     = document.getElementById('erro');
    erro.style.display = 'none';

    const res  = await fetch('../backend/auth/register.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ full_name: nome + ' ' + apelido, email, phone, password, role: 'PASSENGER' })
    });
    const data = await res.json();

    if (data.success) {
      const r = data.user.role;
      window.location.href = r === 'ADMIN' ? 'admin.html'
        : (r === 'DRIVER' || r === 'BOTH') ? 'dashboard_condutor.html'
        : 'dashboard.html';
    } else {
      erro.textContent   = data.message;
      erro.style.display = 'flex';
    }
  }
</script>

</body>
</html>
