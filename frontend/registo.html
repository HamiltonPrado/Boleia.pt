<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boleia.pt — Registo</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/registo.css" />
</head>
<body>

<div class="navbar-wrapper">
  <header class="navbar">
    <a class="brand" href="index.html">
      <div class="brand-icon"><i class="bi bi-car-front-fill"></i></div>
      Boleia.pt
    </a>
    <div class="nav-links"></div>
    <div class="user-actions">
      <a href="login.html" class="nav-item"><i class="bi bi-box-arrow-in-right"></i> Entrar</a>
    </div>
  </header>
</div>

<div class="auth-card" style="max-width:480px">
  <h2>Criar Conta</h2>
  <p class="auth-subtitle">Junta-te à maior comunidade de boleias.</p>

  <form onsubmit="registar(event)">
    <div class="auth-name-row">
      <div class="form-group" style="margin-bottom:0">
        <label>Nome</label>
        <input type="text" id="nome" placeholder="João" required />
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>Apelido</label>
        <input type="text" id="apelido" placeholder="Silva" required />
      </div>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="exemplo@email.com" autocomplete="email" required />
    </div>
    <div class="form-group">
      <label>Telemóvel</label>
      <input type="tel" id="telemovel" placeholder="9XX XXX XXX" autocomplete="tel" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required />
    </div>

    <div class="form-group">
      <label>Quero usar a plataforma como</label>
      <div class="role-selector">
        <label class="role-opt">
          <input type="radio" name="role" value="PASSENGER" checked />
          <span><i class="bi bi-ticket-perforated"></i> Passageiro</span>
        </label>
        <label class="role-opt">
          <input type="radio" name="role" value="DRIVER" />
          <span><i class="bi bi-car-front-fill"></i> Condutor</span>
        </label>
        <label class="role-opt">
          <input type="radio" name="role" value="BOTH" />
          <span><i class="bi bi-arrow-left-right"></i> Ambos</span>
        </label>
      </div>
    </div>

    <div class="carro-fields" id="carro-fields">
      <div class="carro-inner">
        <p class="carro-label"><i class="bi bi-car-front-fill"></i> Dados do veículo <span style="font-weight:400;text-transform:none;letter-spacing:0">(opcional)</span></p>
        <div class="carro-grid">
          <div class="form-group" style="margin-bottom:0">
            <label>Marca</label>
            <input type="text" id="car_make" placeholder="Ex: Volkswagen" autocomplete="off" />
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label>Modelo</label>
            <input type="text" id="car_model" placeholder="Ex: Golf" autocomplete="off" />
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label>Ano</label>
            <input type="number" id="car_year" placeholder="Ex: 2020" min="1980" max="2030" />
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label>Matrícula</label>
            <input type="text" id="car_plate" placeholder="Ex: AA-00-BB" autocomplete="off" />
          </div>
        </div>
      </div>
    </div>

    <div id="erro" class="alert alert-danger" style="display:none;text-align:left"></div>

    <button type="submit" class="btn-submit"><i class="bi bi-person-plus-fill"></i> Criar Conta</button>
  </form>

  <p class="auth-footer">Já tens conta? <a href="login.html">Entra aqui</a></p>
</div>

<script src="utils.js"></script>
<script src="js/registo.js"></script>

</body>
</html>
