<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boleia.pt — Oferecer Boleia</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/publicar.css" />
</head>
<body>

<div class="navbar-wrapper">
  <header class="navbar">
    <a class="brand" href="dashboard.html" id="nav-brand">
      <div class="brand-icon"><i class="bi bi-car-front-fill"></i></div>
      Boleia.pt
    </a>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-item" id="nav-dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="pesquisa.html" class="nav-item" id="nav-pesquisar"><i class="bi bi-search"></i> Pesquisar</a>
      <a href="publicar.html" class="nav-item nav-active"><i class="bi bi-car-front-fill"></i> Oferecer Boleia</a>
      <a href="reservas.html" class="nav-item" id="nav-reservas"><i class="bi bi-ticket-perforated"></i> Reservas</a>
    </div>
    <div class="user-actions">
      <a href="perfil.html" class="nav-item"><i class="bi bi-person-circle"></i> Perfil</a>
      <a href="#" onclick="sair(event)" class="nav-item"><i class="bi bi-box-arrow-right"></i> Sair</a>
    </div>
  </header>
</div>

<div class="wizard-header">
  <div class="wizard-steps">
    <div class="ws active" data-step="1"><div class="ws-num">1</div><span class="ws-label">Rota</span></div>
    <div class="ws-line" id="wl-1"></div>
    <div class="ws" data-step="2"><div class="ws-num">2</div><span class="ws-label">Horário</span></div>
    <div class="ws-line" id="wl-2"></div>
    <div class="ws" data-step="3"><div class="ws-num">3</div><span class="ws-label">Detalhes</span></div>
  </div>
</div>

<div class="publish-layout">

  <div class="publish-sidebar">

    <h2 class="wizard-title">Para onde vais?</h2>

    <form onsubmit="publicar(event)" id="form-publicar" novalidate>

      <div class="passo" data-passo="1">
        <div class="pub-card">
          <h3><i class="bi bi-geo-alt-fill" style="color:var(--primary)"></i> Rota</h3>
          <p class="pub-hint">Escreve o endereço ou clica diretamente no mapa.</p>
          <div id="paragens">
            <div class="paragem" data-index="0">
              <div class="paragem-header">
                <span class="paragem-label"><b>Origem</b></span>
                <button type="button" onclick="selecionarParagem(0)" id="btn-sel-0" class="btn-sel" title="Selecionar no mapa"><i class="bi bi-cursor-fill"></i></button>
              </div>
              <div class="paragem-input-row">
                <div class="paragem-input-wrap">
                  <input type="text" name="address" placeholder="Ex: Sete Rios, Lisboa" autocomplete="off"
                    oninput="pubSugerir(this)" onblur="pubFechar(this,300)" onkeydown="pubNavSug(event,this)" />
                  <div class="pub-suggestions" style="display:none"></div>
                </div>
                <button type="button" onclick="geocodificar(0)"><i class="bi bi-geo-alt-fill"></i> Localizar</button>
              </div>
              <input type="hidden" name="lat" value="0" /><input type="hidden" name="lng" value="0" />
            </div>
            <div class="paragem" data-index="1">
              <div class="paragem-header">
                <span class="paragem-label"><b>Destino</b></span>
                <button type="button" onclick="selecionarParagem(1)" id="btn-sel-1" class="btn-sel" title="Selecionar no mapa"><i class="bi bi-cursor-fill"></i></button>
              </div>
              <div class="paragem-input-row">
                <div class="paragem-input-wrap">
                  <input type="text" name="address" placeholder="Ex: Campanhã, Porto" autocomplete="off"
                    oninput="pubSugerir(this)" onblur="pubFechar(this,300)" onkeydown="pubNavSug(event,this)" />
                  <div class="pub-suggestions" style="display:none"></div>
                </div>
                <button type="button" onclick="geocodificar(1)"><i class="bi bi-geo-alt-fill"></i> Localizar</button>
              </div>
              <input type="hidden" name="lat" value="0" /><input type="hidden" name="lng" value="0" />
            </div>
          </div>
          <button type="button" onclick="adicionarParagem()" class="btn-add-paragem">
            <i class="bi bi-plus-circle"></i> Adicionar paragem intermédia
          </button>
          <p class="pub-hint" style="margin-top:12px;margin-bottom:0;">
            <i class="bi bi-cursor-fill" style="color:var(--primary)"></i>
            Paragem ativa no mapa: <b id="sel-label">Origem</b>
          </p>
        </div>
      </div>

      <div class="passo" data-passo="2" style="display:none">
        <div class="pub-card">
          <h3><i class="bi bi-clock-fill" style="color:var(--primary)"></i> Horário</h3>
          <div class="pub-grid-3" style="margin-bottom:14px;">
            <div class="form-group">
              <label>Hora de partida</label>
              <input type="time" id="hora" />
            </div>
            <div class="form-group">
              <label>Data de início</label>
              <input type="date" id="valid_from" />
            </div>
            <div class="form-group">
              <label>Data de fim <span style="font-weight:400;color:var(--muted)">(opc.)</span></label>
              <input type="date" id="valid_until" />
            </div>
          </div>
          <fieldset>
            <legend>Dias da semana</legend>
            <div class="dias-grid">
              <label><input type="checkbox" name="dia" value="1" /> Seg</label>
              <label><input type="checkbox" name="dia" value="2" /> Ter</label>
              <label><input type="checkbox" name="dia" value="3" /> Qua</label>
              <label><input type="checkbox" name="dia" value="4" /> Qui</label>
              <label><input type="checkbox" name="dia" value="5" /> Sex</label>
              <label><input type="checkbox" name="dia" value="6" /> Sáb</label>
              <label><input type="checkbox" name="dia" value="0" /> Dom</label>
            </div>
          </fieldset>
        </div>
      </div>

      <div class="passo" data-passo="3" style="display:none">
        <div class="pub-card">
          <h3><i class="bi bi-people-fill" style="color:var(--primary)"></i> Lugares & Preço</h3>
          <div class="pub-grid-2" style="margin-bottom:14px;">
            <div class="form-group">
              <label>Lugares disponíveis</label>
              <select id="lugares">
                <option>1</option><option>2</option><option>3</option><option>4</option>
              </select>
            </div>
            <div class="form-group">
              <label>Preço por pessoa (€)</label>
              <input type="number" id="preco" min="0" step="0.01" placeholder="Ex: 12.00" />
            </div>
          </div>
          <div class="form-group">
            <label>Observações <span style="font-weight:400;color:var(--muted)">(opcional)</span></label>
            <textarea id="obs" rows="2" placeholder="Ex: Tenho espaço para bagagem..."></textarea>
          </div>
        </div>
      </div>

      <div class="wizard-nav">
        <button type="button" id="btn-anterior" class="btn-sm btn-muted" onclick="irParaPasso(passoAtual-1)" style="display:none">
          <i class="bi bi-arrow-left"></i> Anterior
        </button>
        <button type="button" id="btn-seguinte" class="nav-btn" onclick="irParaPasso(passoAtual+1)" style="margin-left:auto">
          Seguinte <i class="bi bi-arrow-right"></i>
        </button>
      </div>

      <div id="msg-publicar" class="alert" style="display:none; margin-top:16px;"></div>

    </form>

    <a href="dashboard.html" id="back-link" class="back-link" style="margin-top:20px; display:inline-flex;">
      <i class="bi bi-arrow-left"></i> Voltar ao dashboard
    </a>
  </div>

  
  <div class="publish-map-col">
    <div class="pub-card pub-map-card" style="padding:10px;">
      <div id="mapa"></div>
    </div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="utils.js"></script>
<script src="js/publicar.js"></script>

</body>
</html>
